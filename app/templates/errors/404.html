<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>FyP — Pagina non trovata</title>
  <link rel="icon" type="image/jpeg" href="/static/images/fyp-logo.jpg">
  <link rel="stylesheet" href="/static/css/style.css">
  <style>
    body { min-height:100dvh; display:grid; place-items:center; background:var(--bg); }
    .error-box { text-align:center; max-width:440px; padding:var(--space-8); }
    .error-code { font-size:88px; font-weight:900; color:var(--primary); line-height:1; margin-bottom:8px; }
    .error-title { font-size:24px; font-weight:800; margin-bottom:10px; }
    .error-msg { color:var(--muted); margin-bottom:28px; line-height:1.6; }
  </style>
</head>
<body>
<div class="error-box">
  <div class="error-code">404</div>
  <div class="error-title">Pagina non trovata</div>
  <p class="error-msg">La pagina che cerchi non esiste o è stata spostata.<br>Controlla l'URL o torna alla home.</p>
  <a class="btn btn-primary" href="/">← Torna alla Home</a>
</div>
</body>
</html>
